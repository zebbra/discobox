services:
  discobox:
    build:
      context: .
      args:
        - http_proxy
        - https_proxy
        - no_proxy
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik
      # HTTP → HTTPS redirect
      traefik.http.routers.discobox-http-router.entrypoints: http
      traefik.http.routers.discobox-http-router.rule: Host(`${DISCOBOX_HOSTNAME}`) && PathPrefix(`/sync`, `/discobox/metrics`)
      traefik.http.routers.discobox-http-router.middlewares: discobox-redirect
      traefik.http.middlewares.discobox-redirect.redirectscheme.scheme: https
      # HTTPS
      traefik.http.routers.discobox-https-router.entrypoints: https
      traefik.http.routers.discobox-https-router.tls: "true"
      traefik.http.routers.discobox-https-router.rule: Host(`${DISCOBOX_HOSTNAME}`) && PathPrefix(`/sync`, `/discobox/metrics`)
      traefik.http.services.discobox-service.loadbalancer.server.port: "8080"
      traefik.http.services.discobox-service.loadbalancer.server.scheme: http

  # One-shot CLI sync — override entrypoint:
  #   docker compose run --rm cli --host 10.0.0.1
  cli:
    build:
      context: .
      args:
        - http_proxy
        - https_proxy
        - no_proxy
    env_file:
      - .env
    entrypoint: ["python", "cli.py"]
    profiles:
      - cli

networks:
  traefik:
    external: true
