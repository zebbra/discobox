services:
  discobox:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  # One-shot CLI sync — override entrypoint:
  #   docker compose run --rm cli --host 10.0.0.1
  cli:
    build: .
    env_file:
      - .env
    entrypoint: ["python", "cli.py"]
    profiles:
      - cli
