# Discobox configuration
# Credentials stay in environment variables:
#   NETBOX_URL, NETBOX_TOKEN
#   NETDISCO_URL, NETDISCO_TOKEN  (or NETDISCO_USERNAME + NETDISCO_PASSWORD)
#
# Set any value to null (or omit it) to disable that feature/mapping.

sync:
  vip_mode: threenode       # threenode | soft | hard | off
  lldp_clear_stale: false     # also gates stale discobox-owned cable deletion
  housekeeping: false
  pause_on_error: false
  # no_mac: false
  # no_ip: false            # skips interface IPs; the management IP is always synced
  # no_modules: false
  # no_sfp: false
  # no_poe: false

cabling:
  scope: site               # site = same-site pairs only; null/empty to disable
  source_cf: source
  source_value: netdisco

custom_fields:
  source: source            # interface + device source CF; null to disable
  source_value: netdisco
  os_version: os_version    # null to disable
  os_name: os_name          # null to disable
  os_release: os_release    # null to disable
  stack_members: stack_members  # total physical units; only set for traditional stacks
                                # (real count) and standalone devices (always 1) — null to disable
  neighbor_text: neighbor
  neighbor_port: neighbor_port
  neighbor_device: neighbor_device
  neighbor_iface: neighbor_iface

reconcile:
  interval: 86400           # seconds
  max_queued: null          # abort reconcile if Netdisco queue exceeds this
  max_failed: null
  max_enqueue: null         # cap devices enqueued per reconcile run
  # roles: [router, switch, firewall]   # NetBox device-role slugs; default shown, empty/omitted = all roles
  # statuses: [active]                 # NetBox device statuses to reconcile; default shown.
                                        # Devices under maintenance still respond to SNMP in most
                                        # setups (see the network-netbox-ping alert rules, which
                                        # treat active|maintenance as reachable) — add "maintenance"
                                        # here to reconcile those too.
  require_auth_tag: false    # only enqueue discovery for devices with snmp_auth_profile set;
                             # without it Netdisco has no credentials to try, so discovery just fails
  liveness:                 # skip enqueueing devices a metrics store reports as down
    url: null               # Prometheus-compatible query API incl. tenant prefix, e.g.
                            # http://vmselect:8481/select/0/prometheus — null disables
    query: 'max_over_time(up{job="snmp"}[6h])'   # > 0 = alive, 0 = down, absent = unknown (still enqueued)
    label: netbox_primary_ip  # series label identifying the device
    key: ip                 # device attribute compared to the label: ip | name
    timeout: 15             # query timeout, seconds

auto_create:
  role: null                # NetBox device-role slug; null disables auto-create
  site: null                # fallback NetBox site slug (overridden by SNMP location)
  status: active
  location: false           # parse SNMP location → NetBox location hierarchy

auth:
  metrics_path: /metrics
  # token: null             # prefer DISCOBOX_AUTH_TOKEN env var
